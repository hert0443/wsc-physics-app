<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WSC Physics App</title>
  <style>
    body {
      margin: 0; padding: 0; background-color: #f0f2f5;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      display: flex; justify-content: center;
    }
    #app {
      width: 100%; max-width: 375px; height: 100vh;
      background-color: #ffffff; box-shadow: 0 0 20px rgba(0,0,0,0.1);
      display: flex; flex-direction: column;
    }
    .header {
      background: linear-gradient(135deg, #1e3a8a 0%, #3b82f6 100%);
      color: white; padding: 15px; text-align: center;
    }
    .header h1 { margin: 0; font-size: 18px; }
    .header p { margin: 5px 0 0 0; font-size: 13px; opacity: 0.9; }
    .card-container {
      flex: 1; display: flex; justify-content: center; align-items: center; padding: 20px;
    }
    .flashcard { width: 100%; height: 300px; perspective: 1000px; cursor: pointer; }
    .card-inner {
      position: relative; width: 100%; height: 100%;
      text-align: center; transition: transform 0.4s; transform-style: preserve-3d;
    }
    .card-inner.flipped { transform: rotateY(180deg); }
    .card-front, .card-back {
      position: absolute; width: 100%; height: 100%;
      -webkit-backface-visibility: hidden; backface-visibility: hidden;
      border-radius: 12px; display: flex; flex-direction: column;
      justify-content: center; align-items: center; padding: 20px; box-sizing: border-box;
    }
    .card-front { background-color: #f8fafc; color: #1e3a8a; border: 2px solid #cbd5e1; }
    .card-number { position: absolute; top: 15px; font-size: 12px; color: #64748b; font-weight: bold; }
    .card-front h2 { font-size: 26px; margin: 0; }
    .hint-click { margin-top: 25px; font-size: 11px; color: #2563eb; background: #dbeafe; padding: 4px 12px; border-radius: 20px; }
    .card-back { background-color: #f8fafc; color: #1e293b; border: 2px solid #cbd5e1; transform: rotateY(180deg); }
    .eng-def { font-size: 16px; margin: 0 0 20px 0; line-height: 1.5; font-weight: 500; text-align: left; width: 100%; }
    .translate-btn {
      background-color: #e2e8f0; border: none; color: #475569; padding: 6px 12px;
      border-radius: 6px; font-size: 12px; cursor: pointer; transition: 0.2s; margin-bottom: 10px;
    }
    .translate-btn:hover { background-color: #cbd5e1; }
    .chinese-hint { margin-top: 5px; font-size: 16px; color: #dc2626; font-weight: bold; display: none; text-align: left; width: 100%; line-height: 1.4; }
    .control-panel {
      display: flex; justify-content: space-between; padding: 15px 20px; background-color: #f8fafc; border-top: 1px solid #e2e8f0;
    }
    .nav-btn {
      background-color: #1e3a8a; color: white; border: none; padding: 10px 20px;
      border-radius: 8px; font-size: 14px; font-weight: bold; cursor: pointer; width: 45%;
    }
    .nav-btn:active { opacity: 0.8; }
  </style>
</head>
<body>

<div id="app">
  <div class="header">
    <h1>WSC Physics - LAC Tool</h1>
    <p>Topic 1: Reflection of Light</p>
  </div>
  
  <div class="card-container">
    <div class="flashcard" id="myCard" onclick="flipCard()">
      <div class="card-inner" id="cardInner">
        <div class="card-front">
          <div class="card-number" id="cardNumDisplay">Card 1 / 4</div>
          <h2 id="frontText">Incident Ray</h2>
          <div class="hint-click">💡 Tap to Flip</div>
        </div>
        <div class="card-back">
          <div id="backText" class="eng-def">The light ray that travels towards the mirror.</div>
          <button class="translate-btn" onclick="showChinese(event)">Show Chinese Hint</button>
          <div id="chineseText" class="chinese-hint">入射光線 ↗️</div>
        </div>
      </div>
    </div>
  </div>

  <div class="control-panel">
    <button class="nav-btn" onclick="prevCard()">⬅️ Prev</button>
    <button class="nav-btn" onclick="nextCard()">Next ➡️</button>
  </div>
</div>

<script>
const cardData = [
  { front: "Incident Ray", back: "The light ray that travels towards the mirror.", chi: "入射光線 ↗️" },
  { front: "Reflected Ray", back: "The light ray that bounces off the mirror.", chi: "反射光線 ↖️" },
  { front: "Laws of Reflection", back: "1. Angle of incidence (i) = Angle of reflection (r).<br>2. The incident ray, the normal and the reflected ray all lie in the same plane.", chi: "反射定律：<br>1. 入射角 = 反射角。<br>2. 入射光線、法線和反射光線都在同一平面上。📐" },
  { front: "Lateral Inversion", back: "Inside a plane mirror, your LEFT hand becomes the image's RIGHT hand.", chi: "橫向倒置（左右相反）🪞" }
];

let currentIndex = 0;
const cardInner = document.getElementById('cardInner');

function flipCard() {
  cardInner.classList.toggle('flipped');
}

function showChinese(event) {
  event.stopPropagation();
  const chiText = document.getElementById('chineseText');
  chiText.style.display = (chiText.style.display === 'block') ? 'none' : 'block';
}

function updateCard() {
  cardInner.classList.remove('flipped');
  document.getElementById('chineseText').style.display = 'none';
  
  setTimeout(() => {
    document.getElementById('cardNumDisplay').innerText = `Card ${currentIndex + 1} / ${cardData.length}`;
    document.getElementById('frontText').innerText = cardData[currentIndex].front;
    document.getElementById('backText').innerHTML = cardData[currentIndex].back;
    document.getElementById('chineseText').innerHTML = cardData[currentIndex].chi;
  }, 200);
}

function nextCard() {
  if (currentIndex < cardData.length - 1) {
    currentIndex++;
    updateCard();
  }
}

function prevCard() {
  if (currentIndex > 0) {
    currentIndex--;
    updateCard();
  }
}
</script>

</body>
</html>
